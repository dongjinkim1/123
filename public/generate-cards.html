function makeCardHTML(animal, mod, oheng) {
  var c = OHENG_COLORS[oheng];
  var traitsHTML = '';
  for (var t = 0; t < mod.traits.length; t++) {
    traitsHTML += '<span style="background:rgba(255,255,255,0.18);color:rgba(255,255,255,0.9);font-size:11px;font-weight:600;padding:3px 12px;border-radius:14px;">' + mod.traits[t] + '</span>';
  }
  return '<div style="width:800px;height:400px;border-radius:20px;overflow:hidden;display:flex;flex-direction:column;font-family:Nunito,sans-serif;">' +
    '<div style="background:#fff;padding:12px 0 10px;display:flex;flex-direction:column;align-items:center;gap:1px;">' +
      '<div style="font-weight:900;font-size:30px;letter-spacing:2px;">' +
        '<span style="color:#4CAF7D">M</span><span style="color:#5B8FD4">B</span><span style="color:#E05A5A">T</span><span style="color:#E8B84B">S</span>' +
      '</div>' +
      '<div style="font-size:10px;color:#aaa;font-weight:600;">사주×MBTI 퍼스널 분석</div>' +
    '</div>' +
    '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:30px;position:relative;background:linear-gradient(135deg,' + c.color + ',' + c.colorDark + ');">' +
      '<div style="font-size:70px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.15));margin-bottom:6px;">' + animal.emoji + '</div>' +
      '<div style="display:inline-block;background:rgba(255,255,255,0.22);color:#fff;font-size:12px;font-weight:700;padding:3px 14px;border-radius:20px;margin-bottom:6px;">' + mod.tag + '</div>' +
      '<div style="color:#fff;font-size:18px;font-weight:800;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,0.1);margin-bottom:8px;">' + mod.title + '</div>' +
      '<div style="display:flex;gap:8px;justify-content:center;margin-bottom:17px;">' + traitsHTML + '</div>' +
      '<div style="font-size:11px;color:rgba(255,255,255,0.6);font-weight:600;">💊 ' + mod.rx + '</div>' +
      '<div style="position:absolute;bottom:10px;right:20px;font-size:10px;color:rgba(255,255,255,0.3);font-weight:600;">mbts.kr</div>' +
    '</div>' +
  '</div>';
}

async function generateAll() {
  var btn = document.getElementById('startBtn');
  var progress = document.getElementById('progress');
  var preview = document.getElementById('preview');
  btn.disabled = true;

  var zip = new JSZip();
  var total = ANIMALS.length * 3;
  var count = 0;

  for (var a = 0; a < ANIMALS.length; a++) {
    var animal = ANIMALS[a];
    for (var m = 0; m < animal.mods.length; m++) {
      var mod = animal.mods[m];
      count++;
      var filename = OHENG_CODE[animal.oheng] + ANIMAL_CODE[animal.name] + STATE_CODE[mod.label] + '.png';
      progress.textContent = count + '/' + total + ' — ' + filename + ' 생성 중...';

      preview.innerHTML = makeCardHTML(animal, mod, animal.oheng);
      var cardEl = preview.firstChild;

      await new Promise(function(r) { setTimeout(r, 50); });

      var canvas = await html2canvas(cardEl, { scale: 2, width: 800, height: 400, useCORS: true, backgroundColor: null });
      var blob = await new Promise(function(resolve) { canvas.toBlob(resolve, 'image/png'); });
      zip.file(filename, blob);
    }
  }

  progress.textContent = '모든 카드 생성 완료! ZIP 다운로드 중...';
  var zipBlob = await zip.generateAsync({ type: 'blob' });
  saveAs(zipBlob, 'mbts-animal-cards.zip');
  progress.textContent = total + '장 카드 생성 완료! mbts-animal-cards.zip 다운로드됨.';
  btn.disabled = false;
}
