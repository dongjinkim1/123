function makeCardHTML(animal, mod, oheng) {
  var g = OHENG_GRAD[oheng];
  var rawTitle = mod.title;
  if (TITLE_OVERRIDE[rawTitle]) rawTitle = TITLE_OVERRIDE[rawTitle];
  var titleSize = rawTitle.length >= 24 ? '40px' : '44px';

  return '<div style="width:800px;height:600px;border-radius:24px;overflow:hidden;position:relative;font-family:Pretendard,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(155deg,'+g[0]+','+g[1]+','+g[2]+');">' +
    /* 이모지 */
    '<div style="font-size:200px;line-height:1;filter:drop-shadow(0 8px 24px rgba(0,0,0,0.2));">'+animal.emoji+'</div>' +
    /* 태그 */
    '<div style="color:rgba(255,255,255,0.75);font-size:24px;font-weight:600;margin-top:12px;">'+mod.tag+'</div>' +
    /* 타이틀 */
    '<div style="color:rgba(255,255,255,0.95);font-size:'+titleSize+';font-weight:700;text-align:center;margin-top:12px;padding:0 40px;line-height:1.3;">'+rawTitle+'</div>' +
    /* 하단 브랜드 */
    '<div style="position:absolute;bottom:20px;display:flex;align-items:center;gap:8px;opacity:0.4;color:#fff;">' +
      '<span style="font-family:Nunito,sans-serif;font-size:26px;font-weight:800;">MBTS</span>' +
      '<span style="width:3px;height:3px;border-radius:50%;background:#fff;"></span>' +
      '<span style="font-family:Pretendard,sans-serif;font-size:18px;font-weight:500;">사주×MBTI</span>' +
    '</div>' +
  '</div>';
}

async function generateAll() {
  var btn = document.getElementById('startBtn');
  var progress = document.getElementById('progress');
  var preview = document.getElementById('preview');
  btn.disabled = true;

  var zip = new JSZip();
  var total = ANIMALS.length * 3;
  var count = 0;

  for (var a = 0; a < ANIMALS.length; a++) {
    var animal = ANIMALS[a];
    for (var m = 0; m < animal.mods.length; m++) {
      var mod = animal.mods[m];
      count++;
      var filename = OHENG_CODE[animal.oheng] + ANIMAL_CODE[animal.name] + STATE_CODE[mod.label] + '.png';
      progress.textContent = count + '/' + total + ' — ' + filename + ' 생성 중...';

      preview.innerHTML = makeCardHTML(animal, mod, animal.oheng);
      var cardEl = preview.firstChild;

      await new Promise(function(r) { setTimeout(r, 80); });

      var canvas = await html2canvas(cardEl, { scale: 2, width: 800, height: 600, useCORS: true, backgroundColor: null });
      var blob = await new Promise(function(resolve) { canvas.toBlob(resolve, 'image/png'); });
      zip.file(filename, blob);
    }
  }

  progress.textContent = '모든 카드 생성 완료! ZIP 다운로드 중...';
  var zipBlob = await zip.generateAsync({ type: 'blob' });
  saveAs(zipBlob, 'mbts-animal-cards.zip');
  progress.textContent = total + '장 카드 생성 완료! mbts-animal-cards.zip 다운로드됨.';
  btn.disabled = false;
}
