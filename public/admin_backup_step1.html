<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTS Admin</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard Variable',-apple-system,BlinkMacSystemFont,sans-serif;background:#F8F7F4;color:#1C1C1E;min-height:100vh}

/* ===== Login ===== */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:#fff;border-radius:20px;padding:40px 32px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,0.08);text-align:center}
.login-logo{font-size:28px;font-weight:900;margin-bottom:4px}
.login-logo .m{color:#4CAF7D}.login-logo .b{color:#5B8FD4}.login-logo .t{color:#E05A5A}.login-logo .s{color:#E8B84B}
.login-sub{font-size:14px;color:#8B6CC1;font-weight:700;margin-bottom:32px}
.login-input{width:100%;padding:14px 16px;border:1.5px solid #E5E5EA;border-radius:12px;font-size:15px;outline:none;transition:border .2s;font-family:inherit}
.login-input:focus{border-color:#8B6CC1}
.login-btn{width:100%;padding:14px;margin-top:12px;background:linear-gradient(135deg,#8B6CC1,#6B4F9E);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;font-family:inherit}
.login-btn:hover{opacity:0.9}
.login-btn:disabled{opacity:0.5;cursor:not-allowed}
.login-err{color:#E05A5A;font-size:13px;font-weight:600;margin-top:12px;min-height:20px}

/* ===== Main Layout ===== */
.admin-wrap{display:none;max-width:960px;margin:0 auto;padding:0 16px 40px}
.admin-header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid #E5E5EA;margin-bottom:16px}
.admin-logo{font-size:20px;font-weight:900}
.admin-logo .m{color:#4CAF7D}.admin-logo .b{color:#5B8FD4}.admin-logo .t{color:#E05A5A}.admin-logo .s{color:#E8B84B}
.admin-logo-sub{font-size:12px;color:#8B6CC1;font-weight:700;margin-left:6px}
.logout-btn{background:none;border:1.5px solid #E5E5EA;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;color:#636366;cursor:pointer;font-family:inherit}
.logout-btn:hover{border-color:#8B6CC1;color:#8B6CC1}

/* ===== Tabs ===== */
.tab-bar{display:flex;gap:6px;overflow-x:auto;padding:4px 0 12px;-webkit-overflow-scrolling:touch}
.tab-bar::-webkit-scrollbar{display:none}
.tab-item{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;background:#fff;color:#636366;border:1px solid #E5E5EA}
.tab-item.active{background:#8B6CC1;color:#fff;border-color:#8B6CC1}
.tab-content{display:none}
.tab-content.active{display:block}

/* ===== Dashboard Cards ===== */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
@media(max-width:480px){.dash-grid{grid-template-columns:1fr}}
.dash-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.dash-card-icon{font-size:24px;margin-bottom:8px}
.dash-card-label{font-size:12px;color:#AEAEB2;font-weight:600;margin-bottom:4px}
.dash-card-value{font-size:28px;font-weight:900;color:#1C1C1E}
.dash-card-sub{font-size:11px;color:#636366;margin-top:4px}

/* ===== Activity Log ===== */
.section-title{font-size:15px;font-weight:700;margin-bottom:12px;color:#1C1C1E}
.log-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:16px}
.log-date{font-size:12px;font-weight:700;color:#8B6CC1;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #F0F0F0}
.log-item{font-size:13px;color:#636366;padding:4px 0;line-height:1.6}
.log-time{color:#AEAEB2;font-size:11px;margin-right:6px}
.log-empty{text-align:center;padding:32px;color:#AEAEB2;font-size:13px}

/* ===== Report Button ===== */
.report-btn{width:100%;padding:14px;background:#fff;border:1.5px solid #8B6CC1;border-radius:12px;font-size:14px;font-weight:700;color:#8B6CC1;cursor:pointer;transition:all .2s;font-family:inherit;margin-bottom:16px}
.report-btn:hover{background:#8B6CC1;color:#fff}

/* ===== Toast ===== */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);background:#1C1C1E;color:#fff;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ===== Placeholder ===== */
.placeholder{text-align:center;padding:60px 20px;color:#AEAEB2}
.placeholder-icon{font-size:48px;margin-bottom:12px}
.placeholder-text{font-size:14px;font-weight:600}
.placeholder-sub{font-size:12px;margin-top:4px}

/* ===== Loading ===== */
.loading{text-align:center;padding:40px;color:#AEAEB2;font-size:13px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:24px;height:24px;border:2.5px solid #E5E5EA;border-top-color:#8B6CC1;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
</style>
</head>
<body>

<!-- Login Screen -->
<div class="login-wrap" id="loginScreen">
  <div class="login-card">
    <div class="login-logo"><span class="m">M</span><span class="b">B</span><span class="t">T</span><span class="s">S</span></div>
    <div class="login-sub">Admin</div>
    <input class="login-input" id="pwInput" type="password" placeholder="관리자 비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" id="loginBtn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- Main Admin -->
<div class="admin-wrap" id="adminMain">
  <div class="admin-header">
    <div style="display:flex;align-items:baseline">
      <div class="admin-logo"><span class="m">M</span><span class="b">B</span><span class="t">T</span><span class="s">S</span></div>
      <span class="admin-logo-sub">Admin</span>
    </div>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>

  <div class="tab-bar" id="tabBar">
    <div class="tab-item active" onclick="setAdminTab(0)">📊 대시보드</div>
    <div class="tab-item" onclick="setAdminTab(1)">👥 유저</div>
    <div class="tab-item" onclick="setAdminTab(2)">🍀 클로버</div>
    <div class="tab-item" onclick="setAdminTab(3)">🚨 에러</div>
    <div class="tab-item" onclick="setAdminTab(4)">📢 공지</div>
  </div>

  <!-- Tab 0: Dashboard -->
  <div class="tab-content active" id="tabDash">
    <div class="dash-grid" id="dashGrid">
      <div class="dash-card">
        <div class="dash-card-icon">👥</div>
        <div class="dash-card-label">총 유저</div>
        <div class="dash-card-value" id="dUsersTotal">-</div>
        <div class="dash-card-sub" id="dUsersSub">차단: - / 오늘: -</div>
      </div>
      <div class="dash-card">
        <div class="dash-card-icon">🚨</div>
        <div class="dash-card-label">에러</div>
        <div class="dash-card-value" id="dErrorsUnresolved">-</div>
        <div class="dash-card-sub" id="dErrorsSub">미해결 / 전체: -</div>
      </div>
      <div class="dash-card">
        <div class="dash-card-icon">🍀</div>
        <div class="dash-card-label">클로버 총 발행</div>
        <div class="dash-card-value" id="dClover">-</div>
        <div class="dash-card-sub">누적 발행량</div>
      </div>
      <div class="dash-card">
        <div class="dash-card-icon">📊</div>
        <div class="dash-card-label">분석 건수</div>
        <div class="dash-card-value" id="dAnalysis">-</div>
        <div class="dash-card-sub" id="dAnalysisSub">사주 -건 + 궁합 -건</div>
      </div>
    </div>

    <button class="report-btn" onclick="copyReport()">📋 상태 리포트 복사</button>

    <div class="section-title">최근 관리자 활동</div>
    <div id="logArea" class="log-card">
      <div class="log-empty">활동 기록이 없습니다</div>
    </div>
  </div>

  <!-- Tab 1: Users -->
  <div class="tab-content" id="tabUsers">
    <div class="placeholder">
      <div class="placeholder-icon">👥</div>
      <div class="placeholder-text">유저 관리</div>
      <div class="placeholder-sub">2단계에서 구현 예정</div>
    </div>
  </div>

  <!-- Tab 2: Clover -->
  <div class="tab-content" id="tabClover">
    <div class="placeholder">
      <div class="placeholder-icon">🍀</div>
      <div class="placeholder-text">클로버 관리</div>
      <div class="placeholder-sub">3단계에서 구현 예정</div>
    </div>
  </div>

  <!-- Tab 3: Errors -->
  <div class="tab-content" id="tabErrors">
    <div class="placeholder">
      <div class="placeholder-icon">🚨</div>
      <div class="placeholder-text">에러 관리</div>
      <div class="placeholder-sub">4단계에서 구현 예정</div>
    </div>
  </div>

  <!-- Tab 4: Notices -->
  <div class="tab-content" id="tabNotices">
    <div class="placeholder">
      <div class="placeholder-icon">📢</div>
      <div class="placeholder-text">공지 관리</div>
      <div class="placeholder-sub">5단계에서 구현 예정</div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
var adminToken='';
var dashData=null;

// ===== Login =====
function doLogin(){
  var pw=document.getElementById('pwInput').value;
  var err=document.getElementById('loginErr');
  var btn=document.getElementById('loginBtn');
  if(!pw){err.textContent='비밀번호를 입력하세요';return;}
  btn.disabled=true;
  btn.textContent='로그인 중...';
  err.textContent='';

  fetch('/api/admin/auth',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:pw})
  }).then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d}});})
  .then(function(res){
    btn.disabled=false;
    btn.textContent='로그인';
    if(res.ok&&res.data.success){
      adminToken=res.data.token;
      sessionStorage.setItem('admin_token',adminToken);
      showAdmin();
    }else{
      err.textContent=res.data.error||'로그인 실패';
    }
  }).catch(function(e){
    btn.disabled=false;
    btn.textContent='로그인';
    err.textContent='서버 연결 실패';
  });
}

function doLogout(){
  adminToken='';
  sessionStorage.removeItem('admin_token');
  document.getElementById('adminMain').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('pwInput').value='';
  document.getElementById('loginErr').textContent='';
}

function showAdmin(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('adminMain').style.display='block';
  loadDashboard();
}

// ===== Token restore =====
function checkSession(){
  var saved=sessionStorage.getItem('admin_token');
  if(!saved) return;
  fetch('/api/admin/auth',{
    headers:{'Authorization':'Bearer '+saved}
  }).then(function(r){return r.json();})
  .then(function(d){
    if(d.valid){
      adminToken=saved;
      showAdmin();
    }else{
      sessionStorage.removeItem('admin_token');
    }
  }).catch(function(){
    sessionStorage.removeItem('admin_token');
  });
}

// ===== Tabs =====
function setAdminTab(i){
  var tabs=document.querySelectorAll('.tab-item');
  var contents=document.querySelectorAll('.tab-content');
  for(var n=0;n<tabs.length;n++){
    tabs[n].classList.toggle('active',n===i);
    contents[n].classList.toggle('active',n===i);
  }
}

// ===== Dashboard =====
function loadDashboard(){
  var grid=document.getElementById('dashGrid');
  fetch('/api/admin/dashboard',{
    headers:{'Authorization':'Bearer '+adminToken}
  }).then(function(r){
    if(!r.ok) throw new Error('HTTP_'+r.status);
    return r.json();
  }).then(function(d){
    dashData=d;
    renderDashboard(d);
  }).catch(function(e){
    console.error('[admin] dashboard error:',e);
    renderDashboard({
      users:{total:0,banned:0,today:0},
      errors:{total:0,unresolved:0,today:0},
      clover:{total:0},
      notices:{total:0,pinned:0},
      admin_logs:[],
      saju_results:{total:0},
      gunghap_results:{total:0}
    });
  });
}

function renderDashboard(d){
  document.getElementById('dUsersTotal').textContent=d.users.total;
  document.getElementById('dUsersSub').textContent='차단: '+d.users.banned+' / 오늘: '+d.users.today;
  document.getElementById('dErrorsUnresolved').textContent=d.errors.unresolved;
  document.getElementById('dErrorsSub').textContent='미해결 / 전체: '+d.errors.total;
  document.getElementById('dClover').textContent=d.clover.total;
  var sajuN=d.saju_results.total;
  var ghN=d.gunghap_results.total;
  document.getElementById('dAnalysis').textContent=sajuN+ghN;
  document.getElementById('dAnalysisSub').textContent='사주 '+sajuN+'건 + 궁합 '+ghN+'건';

  // Render logs
  var logs=d.admin_logs||[];
  var logArea=document.getElementById('logArea');
  if(logs.length===0){
    logArea.innerHTML='<div class="log-empty">활동 기록이 없습니다</div>';
    return;
  }

  // Group by date
  var groups={};
  logs.forEach(function(log){
    var dt=log.created_at?log.created_at.slice(0,10):'unknown';
    if(!groups[dt]) groups[dt]=[];
    groups[dt].push(log);
  });

  var html='';
  var dates=Object.keys(groups).sort().reverse();
  dates.forEach(function(dt){
    html+='<div class="log-date">'+dt.replace(/-/g,'.')+'</div>';
    groups[dt].forEach(function(log){
      var time=log.created_at?log.created_at.slice(11,16):'--:--';
      html+='<div class="log-item"><span class="log-time">'+time+'</span>'+(log.action||log.message||'활동')+'</div>';
    });
  });
  logArea.innerHTML=html;
}

// ===== Report Copy =====
function copyReport(){
  var d=dashData;
  if(!d){showToast('데이터를 먼저 로드하세요');return;}
  var now=new Date();
  var dateStr=now.getFullYear()+'.'+(now.getMonth()+1<10?'0':'')+(now.getMonth()+1)+'.'+(now.getDate()<10?'0':'')+now.getDate();

  var text='MBTS 프로젝트 현황 ('+dateStr+')\n\n';
  text+='[DB 현황]\n';
  text+='- 유저: '+d.users.total+'명 (차단: '+d.users.banned+'명, 오늘 가입: '+d.users.today+'명)\n';
  text+='- 사주 분석: '+d.saju_results.total+'건 / 궁합 분석: '+d.gunghap_results.total+'건\n';
  text+='- 미해결 에러: '+d.errors.unresolved+'건 / 전체 에러: '+d.errors.total+'건\n';
  text+='- 클로버 총 발행: '+d.clover.total+'개\n';
  text+='- 공지사항: '+d.notices.total+'개 (핀: '+d.notices.pinned+'개)\n';

  // 최근 관리자 활동
  var logs=d.admin_logs||[];
  text+='\n[최근 관리자 활동]\n';
  if(logs.length===0){
    text+='- 기록 없음\n';
  }else{
    var shown=logs.slice(0,10);
    shown.forEach(function(log){
      var dt=log.created_at||'';
      var mm=dt.slice(5,7)||'--';
      var dd=dt.slice(8,10)||'--';
      var hh=dt.slice(11,16)||'--:--';
      text+='- '+mm+'.'+dd+' '+hh+': '+(log.action||log.message||'활동')+'\n';
    });
  }

  text+='\n[시스템]\n';
  text+='- Supabase 연결: '+(d.users.total>=0?'정상':'에러')+'\n';
  text+='- 테이블: users, clover_history, error_logs, notices, admin_logs, saju_results, gunghap_results, profiles, chat_sessions, payments\n';

  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      showToast('복사 완료!');
    }).catch(function(){
      fallbackCopy(text);
    });
  }else{
    fallbackCopy(text);
  }
}

function fallbackCopy(text){
  var ta=document.createElement('textarea');
  ta.value=text;
  ta.style.cssText='position:fixed;left:-9999px';
  document.body.appendChild(ta);
  ta.select();
  try{document.execCommand('copy');showToast('복사 완료!');}catch(e){showToast('복사 실패');}
  document.body.removeChild(ta);
}

// ===== Toast =====
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}

// ===== Init =====
checkSession();
</script>
</body>
</html>
