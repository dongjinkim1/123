<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTS 로그인 중...</title>
<style>
body{display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#F8F7F4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.loading{text-align:center}
.loading .msg{font-size:15px;color:#666;margin-top:12px}
.spinner{width:40px;height:40px;border:3px solid #eee;border-top:3px solid #8B6CC1;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loading">
  <div class="spinner"></div>
  <div class="msg">카카오 로그인 처리 중...</div>
</div>

<script>
var msgEl = document.querySelector('.msg');

var urlParams = new URLSearchParams(window.location.search);
var code = urlParams.get('code');
var error = urlParams.get('error');

// C5: OAuth CSRF state 검증
var returnedState = urlParams.get('state');
var savedState = null;
try { savedState = sessionStorage.getItem('mbts_oauth_state'); } catch(e) {}

if (error) {
  msgEl.textContent = '카카오 로그인이 취소되었습니다.';
  setTimeout(function() { window.location.href = '/'; }, 1500);
} else if (!code) {
  msgEl.textContent = '인증 코드를 찾을 수 없습니다.';
  setTimeout(function() { window.location.href = '/'; }, 2000);
} else if (!savedState || returnedState !== savedState) {
  console.error('[MBTS] OAuth state mismatch or missing:', returnedState, 'vs', savedState);
  msgEl.textContent = '보안 검증 실패 — 다시 로그인해주세요.';
  try { sessionStorage.removeItem('mbts_oauth_state'); } catch(e) {}
  setTimeout(function() { window.location.href = '/?error=csrf'; }, 2000);
} else {
  // state 검증 통과 — 사용한 state 제거
  try { sessionStorage.removeItem('mbts_oauth_state'); } catch(e) {}
  var redirectUri = window.location.origin + '/auth/kakao/callback';

  // 1단계: 카카오 토큰 교환 + 사용자 정보 조회
  fetch('/api/kakao-token?code=' + encodeURIComponent(code) + '&redirect_uri=' + encodeURIComponent(redirectUri))
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!data.success || !data.kakao_id) {
      throw new Error(data.error || '사용자 정보 조회 실패');
    }
    console.log('[MBTS] 카카오 사용자:', data.nickname, data.kakao_id);

    // 2단계: 서버 API로 유저 생성/조회 (service role key 사용 → RLS 우회)
    return fetch('/api/auth-kakao', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        kakaoId: data.kakao_id,
        nickname: data.nickname || '사용자',
        profileImage: data.profile_image || null,
        email: data.email || null,
        accessToken: data.access_token || null
      })
    });
  })
  .then(function(r) { return r.json(); })
  .then(function(result) {
    if (!result.success || !result.user) {
      throw new Error(result.error || '유저 처리 실패');
    }
    var u = result.user;
    console.log('[MBTS] ' + (result.isNew ? '신규 유저 생성' : '기존 유저 로그인') + ':', u.nickname);

    // 3단계: 세션 저장
    var sessionData = {
      userId: u.id,
      kakaoId: u.kakaoId,
      nickname: u.nickname,
      profileImage: u.profileImage || null,
      provider: 'kakao',
      cloverBalance: u.cloverBalance || 0,
      isNew: (result && result.isNew === true),
      signedUpAt: Date.now()
    };
    try { localStorage.setItem('mbts_session', JSON.stringify(sessionData)); } catch(e) {}

    // 추천인 리워드 처리 (callback에서 onLoginSuccess()를 거치지 않으므로 직접 호출)
    try {
      var ref = localStorage.getItem('mbts_referrer');
      if (ref && ref !== u.id) {
        localStorage.removeItem('mbts_referrer');
        fetch('/api/referral-reward', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ referrerId: ref, newUserId: u.id })
        })
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (d && d.success) {
            // Reflect +2 balance in the already-saved session
            try {
              var s = JSON.parse(localStorage.getItem('mbts_session') || 'null');
              if (s) { s.cloverBalance = (s.cloverBalance || 0) + 2; localStorage.setItem('mbts_session', JSON.stringify(s)); }
            } catch(e) {}
          }
        })
        .catch(function(e) { console.warn('[callback] referral:', e); });
      }
    } catch(e) {}

    msgEl.textContent = '환영합니다, ' + u.nickname + '님!';
    setTimeout(function() { window.location.href = '/'; }, 1000);
  })
  .catch(function(err) {
    console.error('[MBTS] 카카오 로그인 처리 실패:', err);
    msgEl.textContent = '로그인 실패: ' + (err.message || '다시 시도해주세요.');
    setTimeout(function() { window.location.href = '/'; }, 3000);
  });
}
</script>
</body>
</html>
