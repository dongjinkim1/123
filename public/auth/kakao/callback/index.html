<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTS 로그인 중...</title>
<style>
body{display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#F8F7F4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.loading{text-align:center}
.loading .msg{font-size:15px;color:#666;margin-top:12px}
.spinner{width:40px;height:40px;border:3px solid #eee;border-top:3px solid #8B6CC1;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loading">
  <div class="spinner"></div>
  <div class="msg">카카오 로그인 처리 중...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var SUPABASE_URL = 'https://amexswkqohkhypywuscp.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtZXhzd2txb2hraHlweXd1c2NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5NTk1NTYsImV4cCI6MjA4NjUzNTU1Nn0.FIhu_kqvdagDuf3ljzsp0-llJJlBfvacpBDIGn__Plw';
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

var msgEl = document.querySelector('.msg');

// URL에서 인가 코드 추출
var urlParams = new URLSearchParams(window.location.search);
var code = urlParams.get('code');
var error = urlParams.get('error');

if (error) {
  msgEl.textContent = '카카오 로그인이 취소되었습니다.';
  setTimeout(function() { window.location.href = '/'; }, 1500);
} else if (!code) {
  msgEl.textContent = '인증 코드를 찾을 수 없습니다.';
  setTimeout(function() { window.location.href = '/'; }, 2000);
} else {
  // Netlify Function으로 토큰 교환 + 사용자 정보 조회
  var redirectUri = window.location.origin + '/auth/kakao/callback';

  fetch('/.netlify/functions/kakao-token?code=' + encodeURIComponent(code) + '&redirect_uri=' + encodeURIComponent(redirectUri))
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!data.success || !data.kakao_id) {
      throw new Error(data.error || '사용자 정보 조회 실패');
    }

    var kakaoId = data.kakao_id;
    var nickname = data.nickname || '사용자';
    var profileImage = data.profile_image || null;
    var email = data.email || null;

    console.log('[MBTS] 카카오 사용자:', nickname, kakaoId);

    // Supabase에서 기존 유저 확인
    return sb.from('users').select('*').eq('kakao_id', kakaoId).maybeSingle()
      .then(function(result) {
        if (result.error) {
          console.error('[MBTS] 유저 조회 에러:', result.error);
          throw new Error('유저 조회 실패');
        }

        if (result.data) {
          // 기존 유저
          var user = result.data;
          return sb.from('users')
            .update({ nickname: nickname, profile_image: profileImage })
            .eq('id', user.id)
            .then(function() {
              return {
                userId: user.id,
                kakaoId: kakaoId,
                nickname: nickname,
                profileImage: profileImage,
                provider: 'kakao',
                cloverBalance: user.clover_balance || 0
              };
            });
        } else {
          // 신규 유저
          return sb.from('users')
            .insert({
              kakao_id: kakaoId,
              nickname: nickname,
              profile_image: profileImage,
              email: email,
              clover_balance: 50,
              role: 'user'
            })
            .select()
            .single()
            .then(function(insertResult) {
              if (insertResult.error) {
                console.error('[MBTS] 유저 생성 에러:', insertResult.error);
                throw new Error('유저 생성 실패');
              }
              var newUser = insertResult.data;

              // 가입 보너스 기록
              sb.from('clover_history').insert({
                user_id: newUser.id,
                amount: 50,
                balance_after: 50,
                type: 'signup_bonus',
                description: '🎉 가입 축하 보너스'
              });

              return {
                userId: newUser.id,
                kakaoId: kakaoId,
                nickname: nickname,
                profileImage: profileImage,
                provider: 'kakao',
                cloverBalance: 50
              };
            });
        }
      });
  })
  .then(function(sessionData) {
    try {
      localStorage.setItem('mbts_session', JSON.stringify(sessionData));
    } catch(e) {}
    msgEl.textContent = '환영합니다, ' + sessionData.nickname + '님! 🍀';
    setTimeout(function() { window.location.href = '/'; }, 1000);
  })
  .catch(function(err) {
    console.error('[MBTS] 카카오 로그인 처리 실패:', err);
    msgEl.textContent = '로그인 실패: ' + (err.message || '다시 시도해주세요.');
    setTimeout(function() { window.location.href = '/'; }, 3000);
  });
}
</script>
</body>
</html>
