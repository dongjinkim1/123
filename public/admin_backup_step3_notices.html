<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTS Admin</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard Variable',-apple-system,BlinkMacSystemFont,sans-serif;background:#F8F7F4;color:#1C1C1E;min-height:100vh}

/* ===== Login ===== */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:#fff;border-radius:20px;padding:40px 32px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,0.08);text-align:center}
.login-logo{font-size:28px;font-weight:900;margin-bottom:4px}
.login-logo .m{color:#4CAF7D}.login-logo .b{color:#5B8FD4}.login-logo .t{color:#E05A5A}.login-logo .s{color:#E8B84B}
.login-sub{font-size:14px;color:#8B6CC1;font-weight:700;margin-bottom:32px}
.login-input{width:100%;padding:14px 16px;border:1.5px solid #E5E5EA;border-radius:12px;font-size:15px;outline:none;transition:border .2s;font-family:inherit}
.login-input:focus{border-color:#8B6CC1}
.login-btn{width:100%;padding:14px;margin-top:12px;background:linear-gradient(135deg,#8B6CC1,#6B4F9E);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;font-family:inherit}
.login-btn:hover{opacity:0.9}
.login-btn:disabled{opacity:0.5;cursor:not-allowed}
.login-err{color:#E05A5A;font-size:13px;font-weight:600;margin-top:12px;min-height:20px}

/* ===== Main Layout ===== */
.admin-wrap{display:none;max-width:960px;margin:0 auto;padding:0 16px 40px}
.admin-header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid #E5E5EA;margin-bottom:16px}
.admin-logo{font-size:20px;font-weight:900}
.admin-logo .m{color:#4CAF7D}.admin-logo .b{color:#5B8FD4}.admin-logo .t{color:#E05A5A}.admin-logo .s{color:#E8B84B}
.admin-logo-sub{font-size:12px;color:#8B6CC1;font-weight:700;margin-left:6px}
.logout-btn{background:none;border:1.5px solid #E5E5EA;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;color:#636366;cursor:pointer;font-family:inherit}
.logout-btn:hover{border-color:#8B6CC1;color:#8B6CC1}

/* ===== Tabs ===== */
.tab-bar{display:flex;gap:6px;overflow-x:auto;padding:4px 0 12px;-webkit-overflow-scrolling:touch}
.tab-bar::-webkit-scrollbar{display:none}
.tab-item{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;background:#fff;color:#636366;border:1px solid #E5E5EA}
.tab-item.active{background:#8B6CC1;color:#fff;border-color:#8B6CC1}
.tab-content{display:none}
.tab-content.active{display:block}

/* ===== Dashboard Cards ===== */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
@media(max-width:480px){.dash-grid{grid-template-columns:1fr}}
.dash-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.dash-card-icon{font-size:24px;margin-bottom:8px}
.dash-card-label{font-size:12px;color:#AEAEB2;font-weight:600;margin-bottom:4px}
.dash-card-value{font-size:28px;font-weight:900;color:#1C1C1E}
.dash-card-sub{font-size:11px;color:#636366;margin-top:4px}

/* ===== Activity Log ===== */
.section-title{font-size:15px;font-weight:700;margin-bottom:12px;color:#1C1C1E}
.log-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:16px}
.log-date{font-size:12px;font-weight:700;color:#8B6CC1;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #F0F0F0}
.log-item{font-size:13px;color:#636366;padding:4px 0;line-height:1.6}
.log-time{color:#AEAEB2;font-size:11px;margin-right:6px}
.log-empty{text-align:center;padding:32px;color:#AEAEB2;font-size:13px}

/* ===== Report Button ===== */
.report-btn{width:100%;padding:14px;background:#fff;border:1.5px solid #8B6CC1;border-radius:12px;font-size:14px;font-weight:700;color:#8B6CC1;cursor:pointer;transition:all .2s;font-family:inherit;margin-bottom:16px}
.report-btn:hover{background:#8B6CC1;color:#fff}

/* ===== Toast ===== */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);background:#1C1C1E;color:#fff;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ===== Placeholder ===== */
.placeholder{text-align:center;padding:60px 20px;color:#AEAEB2}
.placeholder-icon{font-size:48px;margin-bottom:12px}
.placeholder-text{font-size:14px;font-weight:600}
.placeholder-sub{font-size:12px;margin-top:4px}

/* ===== Loading ===== */
.loading{text-align:center;padding:40px;color:#AEAEB2;font-size:13px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:24px;height:24px;border:2.5px solid #E5E5EA;border-top-color:#8B6CC1;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}

/* ===== Users Tab ===== */
.users-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap}
.users-count{font-size:13px;color:#636366;font-weight:600}
.search-bar{display:flex;gap:8px;margin-bottom:16px}
.search-input{flex:1;padding:10px 14px;border:1.5px solid #E5E5EA;border-radius:10px;font-size:13px;outline:none;font-family:inherit}
.search-input:focus{border-color:#8B6CC1}
.search-btn{padding:10px 18px;background:#8B6CC1;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0}
.user-card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:10px;transition:all .2s}
.user-card.blocked{border:1.5px solid #E05A5A}
.user-card-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.user-avatar{width:40px;height:40px;border-radius:50%;background:#E5E5EA;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden}
.user-avatar img{width:100%;height:100%;object-fit:cover}
.user-info{flex:1;min-width:0}
.user-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.user-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;flex-shrink:0}
.badge-blocked{background:rgba(224,90,90,0.1);color:#E05A5A}
.badge-admin{background:rgba(139,108,193,0.1);color:#8B6CC1}
.user-meta{font-size:11px;color:#AEAEB2;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-details{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.user-detail{font-size:11px;color:#636366;background:#F5F5F5;padding:3px 8px;border-radius:6px}
.user-actions{display:flex;gap:6px;flex-wrap:wrap}
.act-btn{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:opacity .2s}
.act-btn:hover{opacity:0.8}
.act-block{background:rgba(224,90,90,0.1);color:#E05A5A}
.act-unblock{background:rgba(76,175,125,0.1);color:#4CAF7D}
.act-admin{background:rgba(139,108,193,0.1);color:#8B6CC1}
.act-user{background:rgba(99,99,102,0.1);color:#636366}
.pager{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:16px}
.pager-btn{padding:8px 16px;border:1.5px solid #E5E5EA;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#636366;font-family:inherit}
.pager-btn:disabled{opacity:0.4;cursor:not-allowed}
.pager-info{font-size:12px;color:#AEAEB2}
.seed-btn{width:100%;padding:14px;background:#fff;border:1.5px solid #AEAEB2;border-radius:12px;font-size:14px;font-weight:700;color:#636366;cursor:pointer;transition:all .2s;font-family:inherit;margin-bottom:16px}
.seed-btn:hover{border-color:#8B6CC1;color:#8B6CC1}

/* ===== Clover Tab ===== */
.clover-search{display:flex;gap:8px;margin-bottom:16px}
.clover-search-input{flex:1;padding:10px 14px;border:1.5px solid #E5E5EA;border-radius:10px;font-size:13px;outline:none;font-family:inherit}
.clover-search-input:focus{border-color:#8B6CC1}
.clover-search-btn{padding:10px 18px;background:#8B6CC1;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0}

.clover-user-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:16px}
.clover-user-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.clover-user-info{display:flex;align-items:center;gap:12px}
.clover-user-avatar{width:44px;height:44px;border-radius:50%;background:#E5E5EA;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex-shrink:0}
.clover-user-avatar img{width:100%;height:100%;object-fit:cover}
.clover-user-name{font-size:15px;font-weight:700}
.clover-user-meta{font-size:11px;color:#AEAEB2;margin-top:2px}
.clover-balance{text-align:right}
.clover-balance-num{font-size:28px;font-weight:900;color:#4CAF7D}
.clover-balance-label{font-size:11px;color:#AEAEB2}

.clover-adjust{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.clover-amount-input{width:100px;padding:10px 12px;border:1.5px solid #E5E5EA;border-radius:10px;font-size:14px;font-weight:700;text-align:center;outline:none;font-family:inherit}
.clover-amount-input:focus{border-color:#8B6CC1}
.clover-reason-input{flex:1;min-width:120px;padding:10px 12px;border:1.5px solid #E5E5EA;border-radius:10px;font-size:13px;outline:none;font-family:inherit}
.clover-reason-input:focus{border-color:#8B6CC1}
.clover-give-btn{padding:10px 16px;background:#4CAF7D;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.clover-give-btn:hover{opacity:0.9}
.clover-take-btn{padding:10px 16px;background:#E05A5A;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.clover-take-btn:hover{opacity:0.9}

.clover-history-title{font-size:14px;font-weight:700;color:#1C1C1E;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.clover-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #F0F0F0;font-size:13px}
.clover-row:last-child{border-bottom:none}
.clover-row-date{width:70px;color:#AEAEB2;font-size:11px;flex-shrink:0}
.clover-row-type{width:60px;flex-shrink:0}
.clover-type-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}
.type-charge{background:rgba(76,175,125,0.1);color:#4CAF7D}
.type-use{background:rgba(224,90,90,0.1);color:#E05A5A}
.type-reward{background:rgba(139,108,193,0.1);color:#8B6CC1}
.type-admin{background:rgba(99,99,102,0.1);color:#636366}
.type-refund{background:rgba(70,130,180,0.1);color:#4682B4}
.type-signup_bonus{background:rgba(201,154,46,0.1);color:#C99A2E}
.clover-row-desc{flex:1;color:#636366;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.clover-row-amount{width:60px;text-align:right;font-weight:700;flex-shrink:0}
.clover-row-amount.plus{color:#4CAF7D}
.clover-row-amount.minus{color:#E05A5A}
.clover-row-balance{width:50px;text-align:right;color:#AEAEB2;font-size:11px;flex-shrink:0}

/* ===== Errors Tab ===== */
.err-filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.err-filter-btn{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #E5E5EA;background:#fff;color:#636366;font-family:inherit;transition:all .2s}
.err-filter-btn.active{background:#8B6CC1;color:#fff;border-color:#8B6CC1}
.err-filter-btn .err-badge{display:inline-block;background:rgba(224,90,90,0.15);color:#E05A5A;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:4px}
.err-filter-btn.active .err-badge{background:rgba(255,255,255,0.3);color:#fff}

.err-card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:10px;transition:all .2s;border-left:4px solid transparent}
.err-card.unresolved{border-left-color:#E05A5A}
.err-card.resolved{border-left-color:#4CAF7D;opacity:0.7}
.err-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.err-card-left{flex:1;min-width:0}
.err-type-badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;margin-right:6px}
.etype-analysis{background:rgba(139,108,193,0.1);color:#8B6CC1}
.etype-gunghap{background:rgba(212,115,139,0.1);color:#D4738B}
.etype-chat{background:rgba(70,130,180,0.1);color:#4682B4}
.etype-payment{background:rgba(201,154,46,0.1);color:#C99A2E}
.etype-other{background:rgba(99,99,102,0.1);color:#636366}
.err-status-badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700}
.estatus-unresolved{background:rgba(224,90,90,0.1);color:#E05A5A}
.estatus-resolved{background:rgba(76,175,125,0.1);color:#4CAF7D}
.err-message{font-size:13px;color:#1C1C1E;font-weight:600;margin:6px 0 4px;word-break:break-all}
.err-meta{font-size:11px;color:#AEAEB2}
.err-detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid #F0F0F0}
.err-detail.open{display:block}
.err-detail-label{font-size:11px;font-weight:600;color:#8B6CC1;margin-bottom:4px}
.err-detail-json{background:#F8F7F4;border-radius:8px;padding:10px;font-size:11px;color:#636366;max-height:150px;overflow-y:auto;word-break:break-all;font-family:monospace;white-space:pre-wrap}
.err-resolve-area{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.err-resolve-input{flex:1;min-width:120px;padding:8px 10px;border:1.5px solid #E5E5EA;border-radius:8px;font-size:12px;outline:none;font-family:inherit}
.err-resolve-input:focus{border-color:#8B6CC1}
.err-resolve-clover{width:70px;padding:8px 10px;border:1.5px solid #E5E5EA;border-radius:8px;font-size:12px;outline:none;text-align:center;font-family:inherit}
.err-resolve-btn{padding:8px 14px;background:#4CAF7D;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.err-toggle-btn{background:none;border:none;color:#8B6CC1;font-size:12px;font-weight:600;cursor:pointer;padding:4px 0;font-family:inherit}
.err-resolved-info{margin-top:8px;padding:8px 12px;background:rgba(76,175,125,0.06);border-radius:8px;font-size:11px;color:#636366}
</style>
</head>
<body>

<!-- Login Screen -->
<div class="login-wrap" id="loginScreen">
  <div class="login-card">
    <div class="login-logo"><span class="m">M</span><span class="b">B</span><span class="t">T</span><span class="s">S</span></div>
    <div class="login-sub">Admin</div>
    <input class="login-input" id="pwInput" type="password" placeholder="관리자 비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" id="loginBtn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- Main Admin -->
<div class="admin-wrap" id="adminMain">
  <div class="admin-header">
    <div style="display:flex;align-items:baseline">
      <div class="admin-logo"><span class="m">M</span><span class="b">B</span><span class="t">T</span><span class="s">S</span></div>
      <span class="admin-logo-sub">Admin</span>
    </div>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>

  <div class="tab-bar" id="tabBar">
    <div class="tab-item active" onclick="setAdminTab(0)">📊 대시보드</div>
    <div class="tab-item" onclick="setAdminTab(1)">👥 유저</div>
    <div class="tab-item" onclick="setAdminTab(2)">🍀 클로버</div>
    <div class="tab-item" onclick="setAdminTab(3)">🚨 에러</div>
    <div class="tab-item" onclick="setAdminTab(4)">📢 공지</div>
  </div>

  <!-- Tab 0: Dashboard -->
  <div class="tab-content active" id="tabDash">
    <div class="dash-grid" id="dashGrid">
      <div class="dash-card">
        <div class="dash-card-icon">👥</div>
        <div class="dash-card-label">총 유저</div>
        <div class="dash-card-value" id="dUsersTotal">-</div>
        <div class="dash-card-sub" id="dUsersSub">차단: - / 오늘: -</div>
      </div>
      <div class="dash-card">
        <div class="dash-card-icon">🚨</div>
        <div class="dash-card-label">에러</div>
        <div class="dash-card-value" id="dErrorsUnresolved">-</div>
        <div class="dash-card-sub" id="dErrorsSub">미해결 / 전체: -</div>
      </div>
      <div class="dash-card">
        <div class="dash-card-icon">🍀</div>
        <div class="dash-card-label">클로버 총 발행</div>
        <div class="dash-card-value" id="dClover">-</div>
        <div class="dash-card-sub">누적 발행량</div>
      </div>
      <div class="dash-card">
        <div class="dash-card-icon">📊</div>
        <div class="dash-card-label">분석 건수</div>
        <div class="dash-card-value" id="dAnalysis">-</div>
        <div class="dash-card-sub" id="dAnalysisSub">사주 -건 + 궁합 -건</div>
      </div>
    </div>

    <button class="report-btn" onclick="copyReport()">📋 상태 리포트 복사</button>
    <button class="seed-btn" onclick="runSeed()">🔧 테스트 데이터 생성</button>

    <div class="section-title">최근 관리자 활동</div>
    <div id="logArea" class="log-card">
      <div class="log-empty">활동 기록이 없습니다</div>
    </div>
  </div>

  <!-- Tab 1: Users -->
  <div class="tab-content" id="tabUsers">
    <div class="users-header">
      <div class="users-count" id="usersCount">총 유저: -</div>
    </div>
    <div class="search-bar">
      <input class="search-input" id="userSearch" type="text" placeholder="닉네임 또는 이메일 검색" onkeydown="if(event.key==='Enter')searchUsers()">
      <button class="search-btn" onclick="searchUsers()">검색</button>
    </div>
    <div id="userList"></div>
    <div class="pager" id="userPager" style="display:none">
      <button class="pager-btn" id="prevBtn" onclick="changePage(-1)">← 이전</button>
      <span class="pager-info" id="pageInfo"></span>
      <button class="pager-btn" id="nextBtn" onclick="changePage(1)">다음 →</button>
    </div>
  </div>

  <!-- Tab 2: Clover -->
  <div class="tab-content" id="tabClover">
    <div class="clover-search">
      <input class="clover-search-input" id="cloverUserSearch" type="text" placeholder="유저 닉네임, 이메일 또는 ID 검색" onkeydown="if(event.key==='Enter')searchCloverUser()">
      <button class="clover-search-btn" onclick="searchCloverUser()">검색</button>
    </div>

    <div id="cloverUserArea">
      <div class="log-empty">유저를 검색하면 클로버 내역을 볼 수 있습니다</div>
    </div>

    <div id="cloverAdjustArea" style="display:none">
      <div class="clover-user-card" id="cloverUserCard"></div>
      <div class="clover-adjust">
        <input class="clover-amount-input" id="cloverAmount" type="number" placeholder="수량" min="1" value="10">
        <input class="clover-reason-input" id="cloverReason" type="text" placeholder="사유 (예: 이벤트 보상, 오류 보상)">
        <button class="clover-give-btn" onclick="adjustClover('charge')">🍀 지급</button>
        <button class="clover-take-btn" onclick="adjustClover('use')">차감</button>
      </div>
      <div class="clover-history-title">
        <span>클로버 내역</span>
        <span id="cloverHistoryCount" style="font-size:11px;color:#AEAEB2;font-weight:400"></span>
      </div>
      <div class="log-card" id="cloverHistoryList">
        <div class="loading"><div class="spinner"></div><div>내역 로딩 중...</div></div>
      </div>
      <div class="pager" id="cloverPager" style="display:none">
        <button class="pager-btn" onclick="changeCloverPage(-1)" id="cloverPrevBtn">← 이전</button>
        <span class="pager-info" id="cloverPageInfo"></span>
        <button class="pager-btn" onclick="changeCloverPage(1)" id="cloverNextBtn">다음 →</button>
      </div>
    </div>
  </div>

  <!-- Tab 3: Errors -->
  <div class="tab-content" id="tabErrors">
    <div class="err-filters" id="errFilters">
      <button class="err-filter-btn active" onclick="filterErrors('all')">전체</button>
      <button class="err-filter-btn" onclick="filterErrors('unresolved')">미해결<span class="err-badge" id="errUnresolvedBadge">0</span></button>
      <button class="err-filter-btn" onclick="filterErrors('resolved')">해결됨</button>
      <button class="err-filter-btn" onclick="filterErrors('analysis')">분석</button>
      <button class="err-filter-btn" onclick="filterErrors('gunghap')">궁합</button>
      <button class="err-filter-btn" onclick="filterErrors('chat')">채팅</button>
      <button class="err-filter-btn" onclick="filterErrors('payment')">결제</button>
      <button class="err-filter-btn" onclick="filterErrors('other')">기타</button>
    </div>

    <div id="errList">
      <div class="loading"><div class="spinner"></div><div>에러 목록 로딩 중...</div></div>
    </div>

    <div class="pager" id="errPager" style="display:none">
      <button class="pager-btn" onclick="changeErrPage(-1)" id="errPrevBtn">← 이전</button>
      <span class="pager-info" id="errPageInfo"></span>
      <button class="pager-btn" onclick="changeErrPage(1)" id="errNextBtn">다음 →</button>
    </div>
  </div>

  <!-- Tab 4: Notices -->
  <div class="tab-content" id="tabNotices">
    <div class="placeholder">
      <div class="placeholder-icon">📢</div>
      <div class="placeholder-text">공지 관리</div>
      <div class="placeholder-sub">5단계에서 구현 예정</div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
var adminToken='';
var dashData=null;

// ===== Login =====
function doLogin(){
  var pw=document.getElementById('pwInput').value;
  var err=document.getElementById('loginErr');
  var btn=document.getElementById('loginBtn');
  if(!pw){err.textContent='비밀번호를 입력하세요';return;}
  btn.disabled=true;
  btn.textContent='로그인 중...';
  err.textContent='';

  fetch('/api/admin/auth',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:pw})
  }).then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d}});})
  .then(function(res){
    btn.disabled=false;
    btn.textContent='로그인';
    if(res.ok&&res.data.success){
      adminToken=res.data.token;
      sessionStorage.setItem('admin_token',adminToken);
      showAdmin();
    }else{
      err.textContent=res.data.error||'로그인 실패';
    }
  }).catch(function(e){
    btn.disabled=false;
    btn.textContent='로그인';
    err.textContent='서버 연결 실패';
  });
}

function doLogout(){
  adminToken='';
  sessionStorage.removeItem('admin_token');
  document.getElementById('adminMain').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('pwInput').value='';
  document.getElementById('loginErr').textContent='';
}

function showAdmin(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('adminMain').style.display='block';
  loadDashboard();
}

// ===== Token restore =====
function checkSession(){
  var saved=sessionStorage.getItem('admin_token');
  if(!saved) return;
  fetch('/api/admin/auth',{
    headers:{'Authorization':'Bearer '+saved}
  }).then(function(r){return r.json();})
  .then(function(d){
    if(d.valid){
      adminToken=saved;
      showAdmin();
    }else{
      sessionStorage.removeItem('admin_token');
    }
  }).catch(function(){
    sessionStorage.removeItem('admin_token');
  });
}

// ===== Tabs =====
function setAdminTab(i){
  var tabs=document.querySelectorAll('.tab-item');
  var contents=document.querySelectorAll('.tab-content');
  for(var n=0;n<tabs.length;n++){
    tabs[n].classList.toggle('active',n===i);
    contents[n].classList.toggle('active',n===i);
  }
  if(i===1) loadUsers();
  if(i===2 && cloverSelectedUser) loadCloverHistory();
  if(i===3) loadErrors();
}

// ===== Dashboard =====
function loadDashboard(){
  var grid=document.getElementById('dashGrid');
  fetch('/api/admin/dashboard',{
    headers:{'Authorization':'Bearer '+adminToken}
  }).then(function(r){
    if(!r.ok) throw new Error('HTTP_'+r.status);
    return r.json();
  }).then(function(d){
    dashData=d;
    renderDashboard(d);
  }).catch(function(e){
    console.error('[admin] dashboard error:',e);
    renderDashboard({
      users:{total:0,banned:0,today:0},
      errors:{total:0,unresolved:0,today:0},
      clover:{total:0},
      notices:{total:0,pinned:0},
      admin_logs:[],
      saju_results:{total:0},
      gunghap_results:{total:0}
    });
  });
}

function renderDashboard(d){
  document.getElementById('dUsersTotal').textContent=d.users.total;
  document.getElementById('dUsersSub').textContent='차단: '+d.users.banned+' / 오늘: '+d.users.today;
  document.getElementById('dErrorsUnresolved').textContent=d.errors.unresolved;
  document.getElementById('dErrorsSub').textContent='미해결 / 전체: '+d.errors.total;
  document.getElementById('dClover').textContent=d.clover.total;
  var sajuN=d.saju_results.total;
  var ghN=d.gunghap_results.total;
  document.getElementById('dAnalysis').textContent=sajuN+ghN;
  document.getElementById('dAnalysisSub').textContent='사주 '+sajuN+'건 + 궁합 '+ghN+'건';

  // Render logs
  var logs=d.admin_logs||[];
  var logArea=document.getElementById('logArea');
  if(logs.length===0){
    logArea.innerHTML='<div class="log-empty">활동 기록이 없습니다</div>';
    return;
  }

  // Group by date
  var groups={};
  logs.forEach(function(log){
    var dt=log.created_at?log.created_at.slice(0,10):'unknown';
    if(!groups[dt]) groups[dt]=[];
    groups[dt].push(log);
  });

  var html='';
  var dates=Object.keys(groups).sort().reverse();
  dates.forEach(function(dt){
    html+='<div class="log-date">'+dt.replace(/-/g,'.')+'</div>';
    groups[dt].forEach(function(log){
      var time=log.created_at?log.created_at.slice(11,16):'--:--';
      html+='<div class="log-item"><span class="log-time">'+time+'</span>'+(log.action||log.message||'활동')+'</div>';
    });
  });
  logArea.innerHTML=html;
}

// ===== Report Copy =====
function copyReport(){
  var d=dashData;
  if(!d){showToast('데이터를 먼저 로드하세요');return;}
  var now=new Date();
  var dateStr=now.getFullYear()+'.'+(now.getMonth()+1<10?'0':'')+(now.getMonth()+1)+'.'+(now.getDate()<10?'0':'')+now.getDate();

  var text='MBTS 프로젝트 현황 ('+dateStr+')\n\n';
  text+='[DB 현황]\n';
  text+='- 유저: '+d.users.total+'명 (차단: '+d.users.banned+'명, 오늘 가입: '+d.users.today+'명)\n';
  text+='- 사주 분석: '+d.saju_results.total+'건 / 궁합 분석: '+d.gunghap_results.total+'건\n';
  text+='- 미해결 에러: '+d.errors.unresolved+'건 / 전체 에러: '+d.errors.total+'건\n';
  text+='- 클로버 총 발행: '+d.clover.total+'개\n';
  text+='- 공지사항: '+d.notices.total+'개 (핀: '+d.notices.pinned+'개)\n';

  // 최근 관리자 활동
  var logs=d.admin_logs||[];
  text+='\n[최근 관리자 활동]\n';
  if(logs.length===0){
    text+='- 기록 없음\n';
  }else{
    var shown=logs.slice(0,10);
    shown.forEach(function(log){
      var dt=log.created_at||'';
      var mm=dt.slice(5,7)||'--';
      var dd=dt.slice(8,10)||'--';
      var hh=dt.slice(11,16)||'--:--';
      text+='- '+mm+'.'+dd+' '+hh+': '+(log.action||log.message||'활동')+'\n';
    });
  }

  text+='\n[시스템]\n';
  text+='- Supabase 연결: '+(d.users.total>=0?'정상':'에러')+'\n';
  text+='- 테이블: users, clover_history, error_logs, notices, admin_logs, saju_results, gunghap_results, profiles, chat_sessions, payments\n';

  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      showToast('복사 완료!');
    }).catch(function(){
      fallbackCopy(text);
    });
  }else{
    fallbackCopy(text);
  }
}

function fallbackCopy(text){
  var ta=document.createElement('textarea');
  ta.value=text;
  ta.style.cssText='position:fixed;left:-9999px';
  document.body.appendChild(ta);
  ta.select();
  try{document.execCommand('copy');showToast('복사 완료!');}catch(e){showToast('복사 실패');}
  document.body.removeChild(ta);
}

// ===== Toast =====
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}

// ===== Users =====
var usersPage=1;
var usersSearch='';
var usersTotal=0;
var usersLimit=20;

function loadUsers(){
  var list=document.getElementById('userList');
  list.innerHTML='<div class="loading"><div class="spinner"></div><div>유저 목록 로딩 중...</div></div>';
  var qs='?page='+usersPage+'&limit='+usersLimit;
  if(usersSearch) qs+='&search='+encodeURIComponent(usersSearch);

  fetch('/api/admin/users'+qs,{
    headers:{'Authorization':'Bearer '+adminToken}
  }).then(function(r){return r.json();})
  .then(function(d){
    usersTotal=d.total||0;
    document.getElementById('usersCount').textContent='총 유저: '+usersTotal+'명';
    renderUsers(d.users||[]);
    renderPager();
  }).catch(function(e){
    list.innerHTML='<div class="log-empty">유저 목록을 불러올 수 없습니다</div>';
  });
}

function renderUsers(users){
  var list=document.getElementById('userList');
  if(!users||users.length===0){
    list.innerHTML='<div class="log-empty">등록된 유저가 없습니다</div>';
    return;
  }
  var html='';
  for(var i=0;i<users.length;i++){
    var u=users[i];
    var isBlocked=u.is_blocked;
    var isAdmin=u.role==='admin';
    var avatar=u.profile_image?'<img src="'+u.profile_image+'" alt="">':'👤';
    var date=u.created_at?u.created_at.slice(0,10).replace(/-/g,'.'):'';

    html+='<div class="user-card'+(isBlocked?' blocked':'')+'">';
    html+='<div class="user-card-top">';
    html+='<div class="user-avatar">'+avatar+'</div>';
    html+='<div class="user-info">';
    html+='<div class="user-name">'+(u.nickname||'이름없음');
    if(isBlocked) html+=' <span class="user-badge badge-blocked">차단됨</span>';
    if(isAdmin) html+=' <span class="user-badge badge-admin">관리자</span>';
    html+='</div>';
    html+='<div class="user-meta">'+(u.email||'-')+'</div>';
    html+='</div></div>';
    html+='<div class="user-details">';
    html+='<span class="user-detail">ID: '+(u.id?u.id.slice(0,8)+'...':'-')+'</span>';
    if(u.kakao_id) html+='<span class="user-detail">카카오: '+u.kakao_id+'</span>';
    html+='<span class="user-detail">🍀 '+(u.clover_balance||0)+'</span>';
    html+='<span class="user-detail">가입: '+date+'</span>';
    html+='</div>';
    html+='<div class="user-actions">';
    if(isBlocked){
      html+='<button class="act-btn act-unblock" onclick="userAction(\''+u.id+'\',\'unblock\',\''+(u.nickname||'')+'\')">차단 해제</button>';
    }else{
      html+='<button class="act-btn act-block" onclick="userAction(\''+u.id+'\',\'block\',\''+(u.nickname||'')+'\')">차단</button>';
    }
    if(isAdmin){
      html+='<button class="act-btn act-user" onclick="userAction(\''+u.id+'\',\'make_user\',\''+(u.nickname||'')+'\')">일반 유저로</button>';
    }else{
      html+='<button class="act-btn act-admin" onclick="userAction(\''+u.id+'\',\'make_admin\',\''+(u.nickname||'')+'\')">관리자 부여</button>';
    }
    html+='</div>';
    html+='</div>';
  }
  list.innerHTML=html;
}

function renderPager(){
  var totalPages=Math.ceil(usersTotal/usersLimit)||1;
  var pager=document.getElementById('userPager');
  if(usersTotal<=usersLimit){pager.style.display='none';return;}
  pager.style.display='flex';
  document.getElementById('pageInfo').textContent=usersPage+' / '+totalPages;
  document.getElementById('prevBtn').disabled=(usersPage<=1);
  document.getElementById('nextBtn').disabled=(usersPage>=totalPages);
}

function changePage(dir){
  usersPage+=dir;
  if(usersPage<1) usersPage=1;
  loadUsers();
}

function searchUsers(){
  usersSearch=document.getElementById('userSearch').value.trim();
  usersPage=1;
  loadUsers();
}

function userAction(userId,action,nickname){
  var labels={block:'차단',unblock:'차단 해제',make_admin:'관리자 권한 부여',make_user:'일반 유저로 변경'};
  var msg='"'+(nickname||userId)+'" 유저를 '+labels[action]+'하시겠습니까?';
  if(!confirm(msg)) return;

  fetch('/api/admin/users',{
    method:'PATCH',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+adminToken},
    body:JSON.stringify({userId:userId,action:action,memo:''})
  }).then(function(r){return r.json();})
  .then(function(d){
    if(d.success){
      showToast(labels[action]+' 완료');
      loadUsers();
    }else{
      showToast('실패: '+(d.error||'알 수 없는 오류'));
    }
  }).catch(function(e){
    showToast('서버 연결 실패');
  });
}

// ===== Clover =====
var cloverSelectedUser=null;
var cloverPage=1;
var cloverTotal=0;
var cloverLimit=20;

function searchCloverUser(){
  var q=document.getElementById('cloverUserSearch').value.trim();
  if(!q){showToast('검색어를 입력하세요');return;}
  var area=document.getElementById('cloverUserArea');
  area.innerHTML='<div class="loading"><div class="spinner"></div><div>유저 검색 중...</div></div>';
  document.getElementById('cloverAdjustArea').style.display='none';

  fetch('/api/admin/users?search='+encodeURIComponent(q)+'&limit=5',{
    headers:{'Authorization':'Bearer '+adminToken}
  }).then(function(r){return r.json();})
  .then(function(d){
    var users=d.users||[];
    if(users.length===0){
      area.innerHTML='<div class="log-empty">검색 결과가 없습니다</div>';
      return;
    }
    if(users.length===1){
      selectCloverUser(users[0]);
      area.innerHTML='';
      return;
    }
    var html='<div style="margin-bottom:8px;font-size:12px;color:#AEAEB2">'+users.length+'명 검색됨 — 클릭하여 선택</div>';
    for(var i=0;i<users.length;i++){
      var u=users[i];
      html+='<div class="user-card" style="cursor:pointer;margin-bottom:8px" onclick=\'selectCloverUser('+JSON.stringify(u).replace(/'/g,"&#39;")+')\'>';
      html+='<div class="user-card-top" style="margin-bottom:0">';
      html+='<div class="user-avatar">'+(u.profile_image?'<img src="'+u.profile_image+'" alt="">':'👤')+'</div>';
      html+='<div class="user-info">';
      html+='<div class="user-name">'+(u.nickname||'이름없음')+'</div>';
      html+='<div class="user-meta">'+(u.email||'-')+' · 🍀 '+(u.clover_balance||0)+'</div>';
      html+='</div></div></div>';
    }
    area.innerHTML=html;
  }).catch(function(){
    area.innerHTML='<div class="log-empty">검색 실패</div>';
  });
}

function selectCloverUser(user){
  cloverSelectedUser=user;
  cloverPage=1;
  document.getElementById('cloverUserArea').innerHTML='';
  document.getElementById('cloverAdjustArea').style.display='block';

  var card=document.getElementById('cloverUserCard');
  var avatar=user.profile_image?'<img src="'+user.profile_image+'" alt="">':'👤';
  card.innerHTML='<div class="clover-user-top">'
    +'<div class="clover-user-info">'
    +'<div class="clover-user-avatar">'+avatar+'</div>'
    +'<div><div class="clover-user-name">'+(user.nickname||'이름없음')+'</div>'
    +'<div class="clover-user-meta">'+(user.email||'-')+' · ID: '+(user.id?user.id.slice(0,8)+'...':'-')+'</div></div>'
    +'</div>'
    +'<div class="clover-balance">'
    +'<div class="clover-balance-num" id="cloverBalanceNum">🍀 '+(user.clover_balance||0)+'</div>'
    +'<div class="clover-balance-label">현재 잔액</div>'
    +'</div></div>';

  document.getElementById('cloverAmount').value='10';
  document.getElementById('cloverReason').value='';
  loadCloverHistory();
}

function loadCloverHistory(){
  if(!cloverSelectedUser) return;
  var list=document.getElementById('cloverHistoryList');
  list.innerHTML='<div class="loading"><div class="spinner"></div><div>내역 로딩 중...</div></div>';

  fetch('/api/admin/clover?userId='+cloverSelectedUser.id+'&page='+cloverPage+'&limit='+cloverLimit,{
    headers:{'Authorization':'Bearer '+adminToken}
  }).then(function(r){return r.json();})
  .then(function(d){
    cloverTotal=d.total||0;
    document.getElementById('cloverHistoryCount').textContent='총 '+cloverTotal+'건';
    renderCloverHistory(d.history||[]);
    renderCloverPager();
  }).catch(function(){
    list.innerHTML='<div class="log-empty">내역을 불러올 수 없습니다</div>';
  });
}

function renderCloverHistory(history){
  var list=document.getElementById('cloverHistoryList');
  if(!history||history.length===0){
    list.innerHTML='<div class="log-empty">클로버 내역이 없습니다</div>';
    return;
  }
  var typeLabels={charge:'충전',use:'사용',reward:'보상',admin:'관리자',refund:'환불',signup_bonus:'가입'};
  var html='';
  for(var i=0;i<history.length;i++){
    var h=history[i];
    var date=h.created_at?h.created_at.slice(5,16).replace('T',' '):'';
    var typeLabel=typeLabels[h.type]||h.type;
    var isPlus=(h.amount>0);
    html+='<div class="clover-row">';
    html+='<div class="clover-row-date">'+date+'</div>';
    html+='<div class="clover-row-type"><span class="clover-type-badge type-'+h.type+'">'+typeLabel+'</span></div>';
    html+='<div class="clover-row-desc">'+(h.description||h.admin_memo||'-')+'</div>';
    html+='<div class="clover-row-amount '+(isPlus?'plus':'minus')+'">'+(isPlus?'+':'')+h.amount+'</div>';
    html+='<div class="clover-row-balance">'+(h.balance_after!=null?h.balance_after:'-')+'</div>';
    html+='</div>';
  }
  list.innerHTML=html;
}

function renderCloverPager(){
  var totalPages=Math.ceil(cloverTotal/cloverLimit)||1;
  var pager=document.getElementById('cloverPager');
  if(cloverTotal<=cloverLimit){pager.style.display='none';return;}
  pager.style.display='flex';
  document.getElementById('cloverPageInfo').textContent=cloverPage+' / '+totalPages;
  document.getElementById('cloverPrevBtn').disabled=(cloverPage<=1);
  document.getElementById('cloverNextBtn').disabled=(cloverPage>=totalPages);
}

function changeCloverPage(dir){
  cloverPage+=dir;
  if(cloverPage<1) cloverPage=1;
  loadCloverHistory();
}

function adjustClover(type){
  if(!cloverSelectedUser){showToast('유저를 먼저 선택하세요');return;}
  var amount=parseInt(document.getElementById('cloverAmount').value);
  var reason=document.getElementById('cloverReason').value.trim();
  if(!amount||amount<=0){showToast('수량을 입력하세요');return;}
  if(!reason){showToast('사유를 입력하세요');return;}

  var actionLabel=(type==='charge')?'지급':'차감';
  var displayAmount=(type==='charge')?amount:-amount;
  if(!confirm((cloverSelectedUser.nickname||'유저')+'에게 '+amount+'🍀 '+actionLabel+'하시겠습니까?\n사유: '+reason)) return;

  fetch('/api/admin/clover',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+adminToken},
    body:JSON.stringify({userId:cloverSelectedUser.id,amount:displayAmount,type:type==='charge'?'admin':'use',description:reason})
  }).then(function(r){return r.json();})
  .then(function(d){
    if(d.success){
      showToast(actionLabel+' 완료! 잔액: '+d.newBalance+'🍀');
      cloverSelectedUser.clover_balance=d.newBalance;
      document.getElementById('cloverBalanceNum').textContent='🍀 '+d.newBalance;
      document.getElementById('cloverReason').value='';
      loadCloverHistory();
    }else{
      showToast('실패: '+(d.error||'알 수 없는 오류'));
    }
  }).catch(function(){
    showToast('서버 연결 실패');
  });
}

// ===== Errors =====
var errFilter='all';
var errPage=1;
var errTotal=0;
var errLimit=20;

function loadErrors(){
  var list=document.getElementById('errList');
  list.innerHTML='<div class="loading"><div class="spinner"></div><div>에러 목록 로딩 중...</div></div>';

  var qs='?page='+errPage+'&limit='+errLimit;
  if(errFilter==='unresolved') qs+='&resolved=false';
  else if(errFilter==='resolved') qs+='&resolved=true';
  else if(['analysis','gunghap','chat','payment','other'].indexOf(errFilter)>=0) qs+='&type='+errFilter;

  fetch('/api/admin/errors'+qs,{
    headers:{'Authorization':'Bearer '+adminToken}
  }).then(function(r){return r.json();})
  .then(function(d){
    errTotal=d.total||0;
    var unresolved=d.unresolved||0;
    document.getElementById('errUnresolvedBadge').textContent=unresolved;
    renderErrors(d.errors||[]);
    renderErrPager();
  }).catch(function(){
    list.innerHTML='<div class="log-empty">에러 목록을 불러올 수 없습니다</div>';
  });
}

function filterErrors(filter){
  errFilter=filter;
  errPage=1;
  var btns=document.querySelectorAll('.err-filter-btn');
  for(var i=0;i<btns.length;i++){
    var btnFilter=btns[i].getAttribute('onclick').match(/'([^']+)'/);
    if(btnFilter) btns[i].classList.toggle('active',btnFilter[1]===filter);
  }
  loadErrors();
}

function renderErrors(errors){
  var list=document.getElementById('errList');
  if(!errors||errors.length===0){
    list.innerHTML='<div class="log-empty">에러가 없습니다 👍</div>';
    return;
  }
  var typeLabels={analysis:'분석',gunghap:'궁합',chat:'채팅',payment:'결제',other:'기타'};
  var html='';
  for(var i=0;i<errors.length;i++){
    var e=errors[i];
    var isResolved=e.is_resolved;
    var date=e.created_at?e.created_at.slice(0,16).replace('T',' '):'';
    var typeLabel=typeLabels[e.error_type]||e.error_type;
    var userId=e.user_id?e.user_id.slice(0,8)+'...':'비회원';

    html+='<div class="err-card '+(isResolved?'resolved':'unresolved')+'" id="errCard'+e.id+'">';
    html+='<div class="err-card-top">';
    html+='<div class="err-card-left">';
    html+='<span class="err-type-badge etype-'+e.error_type+'">'+typeLabel+'</span>';
    html+='<span class="err-status-badge estatus-'+(isResolved?'resolved':'unresolved')+'">'+(isResolved?'해결':'미해결')+'</span>';
    html+='<div class="err-message">'+(e.error_message||'메시지 없음')+'</div>';
    html+='<div class="err-meta">'+date+' · 유저: '+userId+'</div>';
    html+='</div></div>';

    // 토글 버튼
    html+='<button class="err-toggle-btn" onclick="toggleErrDetail(\''+e.id+'\')">상세 보기 ▼</button>';

    // 상세 영역
    html+='<div class="err-detail" id="errDetail'+e.id+'">';
    if(e.request_data){
      html+='<div class="err-detail-label">요청 데이터</div>';
      html+='<div class="err-detail-json">'+JSON.stringify(e.request_data,null,2)+'</div>';
    }

    if(isResolved){
      html+='<div class="err-resolved-info">';
      html+='✅ 해결: '+(e.resolved_memo||'-');
      if(e.compensated_clover>0) html+=' · 🍀 '+e.compensated_clover+' 보상';
      if(e.resolved_at) html+=' · '+e.resolved_at.slice(0,16).replace('T',' ');
      html+='</div>';
    }else{
      html+='<div class="err-resolve-area">';
      html+='<input class="err-resolve-input" id="errMemo'+e.id+'" type="text" placeholder="해결 메모">';
      html+='<input class="err-resolve-clover" id="errClover'+e.id+'" type="number" placeholder="🍀" min="0" value="0">';
      html+='<button class="err-resolve-btn" onclick="resolveError(\''+e.id+'\')">해결 처리</button>';
      html+='</div>';
    }
    html+='</div>';
    html+='</div>';
  }
  list.innerHTML=html;
}

function toggleErrDetail(errId){
  var detail=document.getElementById('errDetail'+errId);
  if(detail) detail.classList.toggle('open');
}

function resolveError(errId){
  var memo=document.getElementById('errMemo'+errId).value.trim();
  var clover=parseInt(document.getElementById('errClover'+errId).value)||0;
  if(!memo){showToast('해결 메모를 입력하세요');return;}
  if(!confirm('이 에러를 해결 처리하시겠습니까?'+(clover>0?'\n보상 클로버: '+clover+'🍀':''))) return;

  fetch('/api/admin/errors',{
    method:'PATCH',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+adminToken},
    body:JSON.stringify({errorId:errId,memo:memo,compensateClover:clover})
  }).then(function(r){return r.json();})
  .then(function(d){
    if(d.success){
      showToast('해결 처리 완료'+(clover>0?' (🍀 '+clover+' 보상)':''));
      loadErrors();
    }else{
      showToast('실패: '+(d.error||'알 수 없는 오류'));
    }
  }).catch(function(){
    showToast('서버 연결 실패');
  });
}

function renderErrPager(){
  var totalPages=Math.ceil(errTotal/errLimit)||1;
  var pager=document.getElementById('errPager');
  if(errTotal<=errLimit){pager.style.display='none';return;}
  pager.style.display='flex';
  document.getElementById('errPageInfo').textContent=errPage+' / '+totalPages;
  document.getElementById('errPrevBtn').disabled=(errPage<=1);
  document.getElementById('errNextBtn').disabled=(errPage>=totalPages);
}

function changeErrPage(dir){
  errPage+=dir;
  if(errPage<1) errPage=1;
  loadErrors();
}

// ===== Seed =====
function runSeed(){
  if(!confirm('테스트 유저 3명을 생성합니다. 계속하시겠습니까?')) return;

  fetch('/api/admin/seed',{
    method:'POST',
    headers:{'Authorization':'Bearer '+adminToken}
  }).then(function(r){return r.json();})
  .then(function(d){
    console.log('[seed 응답]', JSON.stringify(d, null, 2));
    if(d.success){
      var msg = '생성: '+d.created+'명, 스킵: '+d.skipped+'명';
      if(d.errors && d.errors.length > 0){
        msg += '\n⚠ 경고 '+d.errors.length+'건:';
        for(var i=0;i<d.errors.length;i++){
          msg += '\n- ['+d.errors[i].step+'] '+d.errors[i].message;
        }
        alert(msg);
      }else{
        showToast(msg);
      }
      if(d.debug){
        console.log('[seed debug] 컬럼:', d.debug.columns);
      }
      loadDashboard();
    }else{
      var errMsg = '실패: '+(d.error||'알 수 없는 오류');
      if(d.errors && d.errors.length > 0){
        for(var i=0;i<d.errors.length;i++){
          errMsg += '\n- ['+d.errors[i].step+'] '+d.errors[i].message;
        }
      }
      alert(errMsg);
    }
  }).catch(function(e){
    showToast('서버 연결 실패');
    console.error('[seed] fetch 에러:', e);
  });
}

// ===== Init =====
checkSession();
