<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>MBTS OG 이미지 생성</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Serif+KR:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body style="margin:20px;font-family:sans-serif">
<h2>MBTS OG 이미지 생성기 (1200×630)</h2>
<button onclick="downloadOG()" style="padding:12px 24px;font-size:16px;cursor:pointer;margin-bottom:20px">OG 이미지 다운로드</button>
<br>
<div id="ogCard" style="width:1200px;height:630px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;position:relative;">
  <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:80px;letter-spacing:4px;line-height:1;">
    <span style="color:#4CAF7D">M</span><span style="color:#5B8FD4">B</span><span style="color:#E05A5A">T</span><span style="color:#E8B84B">S</span>
  </div>
  <div style="font-family:'Noto Sans KR',sans-serif;font-size:22px;color:#444;font-weight:500;letter-spacing:1px;margin-top:6px;">사주×MBTI 퍼스널 분석</div>
  <div style="font-family:'Noto Serif KR',serif;font-size:18px;color:#444;font-weight:500;margin-top:35px;">세상에 같은 풀이는 없습니다.</div>
  <div style="position:absolute;bottom:24px;font-size:14px;color:#666;font-weight:600;">mbts.kr</div>
</div>
<script>
function downloadOG() {
  var card = document.getElementById('ogCard');
  html2canvas(card, { scale: 1, width: 1200, height: 630 }).then(function(canvas) {
    var link = document.createElement('a');
    link.download = 'og-image.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
}
</script>
</body>
</html>
